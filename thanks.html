<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شكراً لك | Thanks — الشركة الدولية للصناعات</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/png" href="assets/images/brand/logo-ici.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    .thanks-section {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 80px 24px; background: linear-gradient(135deg, #FAF8F5 0%, #F4F2EE 100%);
      text-align: center;
    }
    .thanks-card {
      max-width: 560px; background: var(--salt-white); padding: 60px 40px;
      border-radius: 20px; box-shadow: var(--shadow-lg);
    }
    .success-icon {
      width: 96px; height: 96px; background: var(--ici-red); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px; color: var(--salt-white); font-size: 48px;
      animation: scaleIn 0.5s ease-out;
    }
    @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
    .thanks-card h1 { font-size: clamp(28px, 4vw, 38px); font-weight: 900; margin-bottom: 16px; }
    .thanks-card p { font-size: 16px; color: var(--text-mid); line-height: 1.8; margin-bottom: 32px; }
    .thanks-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>

<section class="thanks-section">
  <div class="thanks-card">
    <div class="success-icon">✓</div>
    <h1 data-ar="شكراً لتواصلك معنا" data-en="Thank You for Contacting Us">شكراً لتواصلك معنا</h1>
    <p data-ar="استلمنا طلبك بنجاح. سيقوم فريقنا بالرد عليك خلال ساعات العمل (الأحد - الخميس، 8 ص - 6 م). للأمور العاجلة، يرجى التواصل معنا عبر واتساب." data-en="We have received your request successfully. Our team will respond during working hours (Sun - Thu, 8 AM - 6 PM). For urgent matters, please contact us via WhatsApp.">
      استلمنا طلبك بنجاح. سيقوم فريقنا بالرد عليك خلال ساعات العمل (الأحد - الخميس، 8 ص - 6 م). للأمور العاجلة، يرجى التواصل معنا عبر واتساب.
    </p>
    <div class="thanks-actions">
      <a href="index.html" class="btn-primary" data-ar="العودة للرئيسية ←" data-en="Back to Home →">العودة للرئيسية ←</a>
      <a href="https://wa.me/97455465513" class="btn-outline" target="_blank" data-ar="واتساب" data-en="WhatsApp">واتساب</a>
    </div>
  </div>
</section>

<script src="assets/js/main.js"></script>

</html>
